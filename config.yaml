# yaml-language-server: $schema=../../schema/local.json
config:
  adminAddr: "0.0.0.0:15000"
  logging:
    filter: debug  # 日誌級別 (debug, info, warn, error)

binds:
- port: 32110
  listeners:
  - routes:
    - policies:
        cors:
          allowOrigins:
            - "*"
          allowHeaders:
            - content-type
            - mcp-protocol-version
            - cache-control
          exposeHeaders:
            - Mcp-Session-Id
      backends:
      - mcp:
          targets:
          - name: Wistron-LION-KPI
            mcp:
              host: http://10.28.120.3:1024/mcp
